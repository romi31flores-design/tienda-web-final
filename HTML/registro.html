<title>Registro - Bebote Indumentaria</title>

<!-- Librería de iconos -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
```

</head>

<body>

```
<!-- ENCABEZADO -->
<header>
    <h1>INDUMENTARIA PARA BEBOTES</h1>
    <p>Moda infantil con estilo y diversión</p>
</header>

<!-- MENÚ DE NAVEGACIÓN -->
<nav>
    <a href="index.html"><i class="fa-solid fa-house"></i> Inicio</a>
    <a href="niñas.html"><i class="fa-solid fa-child-dress"></i> Niñas</a>
    <a href="niños.html"><i class="fa-solid fa-child"></i> Niños</a>
    <a href="ofertas.html"><i class="fa-solid fa-tags"></i> Ofertas</a>
    <a href="contacto.html"><i class="fa-solid fa-phone"></i> Contacto</a>

    <a href="login.html" class="icono-nav">
        <i class="fa-solid fa-user"></i>
    </a>

    <a href="pedidos.html" class="icono-nav">
        <i class="fa-solid fa-box"></i>
    </a>

    <a href="carrito.html" class="icono-nav">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="contador-carrito">0</span>
    </a>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<main>

    <!-- FORMULARIO DE REGISTRO -->
    <section class="registro-container">

        <div class="registro-box">

            <i class="fa-solid fa-user-plus registro-icon"></i>

            <h2>Crear cuenta</h2>

            <p>
                Registrate para guardar tus pedidos y comprar más rápido.
            </p>

            <form id="form-registro">

                <!-- NOMBRE -->
                <label for="nombre">Nombre completo</label>
                <input
                    type="text"
                    id="nombre"
                    name="nombre"
                    placeholder="Nombre completo"
                    required>

                <!-- EMAIL -->
                <label for="email">Correo electrónico</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="Correo electrónico"
                    required>

                <!-- CONTRASEÑA -->
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Contraseña"
                    required>

                <!-- CONFIRMAR CONTRASEÑA -->
                <label for="confirmarPassword">Confirmar contraseña</label>
                <input
                    type="password"
                    id="confirmarPassword"
                    name="confirmarPassword"
                    placeholder="Confirmar contraseña"
                    required>

                <button type="submit">
                    Registrarme
                </button>

            </form>

            <!-- MENSAJE DE VALIDACIÓN -->
            <p id="mensaje-registro"></p>

            <p class="registro-link">
                ¿Ya tenés cuenta?
                <a href="login.html">Iniciar sesión</a>
            </p>

            <a href="index.html" class="volver-btn">
                Volver a la tienda
            </a>

        </div>

    </section>

</main>

<!-- JAVASCRIPT -->
<script src="JS/registro.js"></script>
```

</body>

</html>
