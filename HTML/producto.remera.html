<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remera Infantil - Bebote Indumentaria</title>

    <link rel="stylesheet" href="../CSS/general.css">
    <link rel="stylesheet" href="../CSS/detalle-producto.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header>
        <h1>INDUMENTARIA PARA BEBOTES</h1>
        <p>Moda infantil con estilo y diversión</p>
    </header>

    <section class="detalle-container">

        <div class="detalle-box">

            <div class="detalle-imagen">
                <img src="../imagenes/remera-vans.jpeg" alt="Remera Infantil">
            </div>

            <div class="detalle-info">

                <h1>Remera Infantil Vans</h1>

                <p class="detalle-precio">$18.000</p>

                <p class="detalle-descripcion">
                    Remera infantil cómoda y moderna. Ideal para uso diario,
                    paseos y actividades al aire libre.
                </p>

                <h3>Colores disponibles</h3>

                <div class="colores">
                    <span class="color beige"></span>
                    <span class="color blanco"></span>
                    <span class="color negro"></span>
                </div>

                <h3>Talles disponibles</h3>

                <div class="talles">
                    <button>2</button>
                    <button>4</button>
                    <button>6</button>
                    <button>8</button>
                    <button>10</button>
                </div>

                <button class="btn-agregar">
                    Agregar al carrito
                </button>

                <a href="niños.html" class="volver-btn">
                    Volver a la tienda
                </a>

            </div>

        </div>

    </section>

</body>
</html>
